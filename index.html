<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bridge — Frontend Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .chat-container { scrollbar-width: thin; }
        .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; }
        .user-message { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .ai-message { background: #f1f5f9; color: #1e2937; }

        .scroll-panel {
            scrollbar-width: thin;
            scrollbar-color: #64748b #1e2937;
        }
        .scroll-panel::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-panel::-webkit-scrollbar-thumb {
            background: #64748b;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex overflow-hidden">

    <!-- Левая панель -->
    <div class="w-2/5 border-r border-slate-800 flex flex-col h-full overflow-hidden">
        <header class="bg-slate-900 px-6 py-4 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-2xl">✦</div>
                <h1 class="text-2xl font-bold">AI Bridge</h1>
            </div>
            <button onclick="clearChatHistory()" 
                    class="flex items-center gap-2 px-4 py-2 text-red-400 hover:bg-red-950 rounded-2xl text-sm transition">
                <i class="fas fa-trash"></i> Очистить
            </button>
        </header>

        <div id="chat" class="flex-1 min-h-0 overflow-y-auto p-6 space-y-6 chat-container bg-slate-950"></div>

        <div class="p-6 border-t border-slate-800 bg-slate-900">
            <div class="flex gap-3">
                <input id="user-input" type="text"
                       class="flex-1 bg-slate-800 border border-slate-700 focus:border-violet-500 rounded-3xl px-6 py-4 outline-none text-base transition"
                       placeholder="Например: красная кнопка с белым текстом и тенью...">
                <button id="send-btn"
                        class="bg-violet-600 hover:bg-violet-700 w-14 h-14 flex items-center justify-center rounded-3xl text-white transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Правая панель -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <div class="flex-1 flex flex-col min-h-0 overflow-hidden">

            <!-- Код -->
            <div class="flex-1 flex flex-col border-b border-slate-800 min-h-0">
                <div class="px-6 py-3 bg-slate-900 border-b border-slate-800 flex items-center justify-between text-sm font-medium">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-code text-emerald-400"></i>
                        <span>Код компонента</span>
                    </div>
                    <button onclick="copyCode()" 
                            class="flex items-center gap-2 px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-2xl text-xs transition">
                        <i class="fas fa-copy"></i> Скопировать
                    </button>
                </div>
                <pre id="code-block" 
                     class="flex-1 min-h-0 p-6 overflow-y-auto overflow-x-auto scroll-panel bg-slate-950 text-emerald-300 font-mono text-sm whitespace-pre leading-relaxed">
                </pre>
            </div>

            <!-- Превью -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="px-6 py-3 bg-slate-900 border-b border-slate-800 flex items-center gap-2 text-sm font-medium">
                    <i class="fas fa-eye text-sky-400"></i>
                    <span>Живое превью</span>
                </div>
                <div class="flex-1 min-h-0 p-8 bg-slate-100 overflow-y-auto scroll-panel flex items-center justify-center">
                    <iframe id="preview-frame" 
                            class="w-full max-w-3xl h-full border-2 border-slate-300 shadow-2xl rounded-3xl bg-white"
                            frameborder="0">
                    </iframe>
                </div>
            </div>

        </div>
    </div>

<script>
const API_BASE = 'http://localhost:8000';

function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
    div.innerHTML = `
        <div class="message ${role === 'user' ? 'user-message' : 'ai-message'}">
            <div class="text-xs opacity-75 mb-1">${role === 'user' ? 'Вы' : 'Gemini'}</div>
            <div class="whitespace-pre-wrap break-words">${text}</div>
        </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showCode(code) {
    document.getElementById('code-block').textContent = code || '// Код не получен';
}

function renderPreview(code) {
    const frame = document.getElementById('preview-frame');
    frame.srcdoc = code || `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999">Превью появится здесь</div>`;
}

async function loadLastRequest() {
    try {
        const res = await fetch(`${API_BASE}/requests`);
        const data = await res.json();

        if (!data.length) return;

        const item = data[0];
        addMessage('user', item.prompt);

        let resp;
        try {
            resp = JSON.parse(item.response);
        } catch {
            resp = { description: item.response, code: '' };
        }

        addMessage('ai', resp.description);
        showCode(resp.code);
        renderPreview(resp.code);

    } catch {}
}

async function sendMessage() {
    const input = document.getElementById('user-input');
    const prompt = input.value.trim();
    if (!prompt) return;

    addMessage('user', prompt);
    input.value = '';

    try {
        const res = await fetch(`${API_BASE}/requests`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        addMessage('ai', data.description);
        showCode(data.code);
        renderPreview(data.code);

    } catch (err) {
        addMessage('ai', 'Ошибка соединения');
    }
}

function copyCode() {
    const code = document.getElementById('code-block').textContent.trim();
    navigator.clipboard.writeText(code);
}

window.onload = () => {
    loadLastRequest();

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('user-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage();
    });
};
</script>

</body>
</html>
